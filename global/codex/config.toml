# Codex CLI Configuration
# Generated by model-set setup script - do not edit directly.
# Edit config.toml.template and re-run setup.

# MODEL SETTINGS
# ------------------------------------------------------------------------------
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
[features]
personality = "pragmatic"
multi_agent = "true"


# MCP Servers - Global (always available)
# ------------------------------------------------------------------------------
[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
http_headers = { "CONTEXT7_API_KEY" = "ctx7sk-2b3360ad-6737-4b2b-bdc9-443910f6a2dc" }

# AUTHORIZATION
# ------------------------------------------------------------------------------
[runtime]
approval_policy = "untrusted"
[windows]
sandbox = "elevated"

# BASH / SHELL COMMAND AUTHORIZATION
# ------------------------------------------------------------------------------
# In "untrusted" mode, we must explicitly whitelist command prefixes.
[capabilities.shell]
enabled = true
allow_list = [
    "agent-browser",
    "docker",
    "docker-compose",
    "npm",
    "npx",
    "pnpm",
    "yarn",
    "bun",
    "node",
    "git",
    "gh",
    "python",
    "pip"
]
# Explicitly block high-risk commands to override any accidental broad access
deny_list = ["sudo", "rm -rf", "chown", "chmod"]

# MCP & EXTERNAL TOOL INTEGRATIONS
# ------------------------------------------------------------------------------
# Codex identifies MCPs via their registered namespace.
[approvals.tools]
# Automatically approve all tools under these namespaces
auto_approve_namespaces = [
    "context7",
    "aiguide",
    "postgres",
    "redis",
]

# FILE SYSTEM ACCESS (Scoped Permissions)
# ------------------------------------------------------------------------------
[capabilities.files]
# Define which patterns the model can Read/Write without asking
allow_read = [
    "**/*.json",
    "**/*.js",
    "**/*.ts",
    "**/*.tsx",
    "**/*.py"
]

allow_write = [
    "**/*.js",
    "**/*.ts",
    "**/*.tsx",
    "**/*.py",
    "**/*.json"
]

# Strict protection for sensitive files
deny_access = [
    ".env*",
    "**/secrets/**",
    "**/.ssh/**"
]

# NETWORK ACCESS (Required for Stripe and MCPs)
# ------------------------------------------------------------------------------
[capabilities.network]
enabled = true
# Restrict to necessary domains if you want higher security
allow_domains = [
    "api.stripe.com",
    "*.mcp.run",      # Common for hosted MCPs
    "localhost"       # For local MCP servers
]